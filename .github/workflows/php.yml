name: Validacao PHP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Validar sintaxe dos endpoints PHP
        run: |
          find endpoints deploy/endpoints -type f -name "*.php" -print0 | xargs -0 -n 1 php -l
